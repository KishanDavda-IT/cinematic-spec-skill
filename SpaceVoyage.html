<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID — Space Exploration Hero</title>
    <!-- Tech Stack -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@1,6..72,200..800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        @layer utilities {
            .glass-card {
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
            }
            .glass-pill {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.12);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
            }
            .text-glow {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            }
        }
        body {
            background: black;
            margin: 0;
            overflow-x: hidden;
        }
        .font-serif { font-family: 'Newsreader', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion, AnimatePresence } = window.Motion;

        const IconArrowUpRight = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M7 17L17 7M7 7h10v10"/>
            </svg>
        );

        const IconPlay = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
            </svg>
        );

        const IconClock = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        );

        const IconGlobe = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                <path d="M12 21a9 9 0 100-18 9 9 0 000 18zm0 0c2.485 0 4.5-4.03 4.5-9s-2.015-9-4.5-9-4.5 4.03-4.5 9 2.015 9 4.5 9zM3 12h18"/>
            </svg>
        );

        function App() {
            return (
                <div className="relative min-h-screen w-full bg-black text-white flex flex-col items-center justify-center overflow-hidden font-sans px-6 py-20 text-center">
                    {/* Background Layer */}
                    <motion.div 
                        initial={{ scale: 1.1, opacity: 0 }}
                        animate={{ scale: 1, opacity: 1 }}
                        transition={{ duration: 2, ease: "easeOut" }}
                        className="absolute inset-0 z-0"
                    >
                        <img 
                            src="https://images.unsplash.com/photo-1464802686167-b939a67a06d1?q=80&w=2070&auto=format&fit=crop" 
                            className="w-full h-full object-cover"
                            alt="Space Background"
                        />
                        <div className="absolute inset-0 bg-black/60" />
                    </motion.div>

                    {/* Logo */}
                    <div className="fixed top-10 left-10 z-50">
                        <div className="glass-pill w-12 h-12 flex items-center justify-center rounded-full italic font-serif text-xl">
                            a
                        </div>
                    </div>

                    {/* Content Layer */}
                    <div className="relative z-10 flex flex-col items-center">
                        {/* Top Badge */}
                        <motion.div 
                            initial={{ y: -20, opacity: 0 }}
                            animate={{ y: 0, opacity: 1 }}
                            transition={{ duration: 0.8, delay: 0.2 }}
                            className="glass-pill px-2 py-1 flex items-center gap-3 mb-12 rounded-full"
                        >
                            <span className="bg-white text-black px-4 py-0.5 rounded-full font-bold text-xs">New</span>
                            <span className="text-xs tracking-wide font-light pr-3">Maiden Crewed Voyage to Mars Arrives 2026</span>
                        </motion.div>

                        {/* Hero Title */}
                        <motion.h1 
                            initial={{ filter: 'blur(12px)', opacity: 0, scale: 1.1 }}
                            animate={{ filter: 'blur(0px)', opacity: 1, scale: 1 }}
                            transition={{ duration: 1, delay: 0.4 }}
                            className="font-serif italic text-5xl md:text-7xl lg:text-8xl leading-[1.1] max-w-4xl mb-8 tracking-tight text-glow"
                        >
                            Venture Past Our Sky Across the Universe
                        </motion.h1>

                        {/* Hero Description */}
                        <motion.p 
                            initial={{ opacity: 0, y: 10 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.8, delay: 0.6 }}
                            className="text-sm md:text-lg text-white/60 max-w-2xl mb-12 leading-relaxed font-light"
                        >
                            Discover the universe in ways once unimaginable. Our pioneering vessels and breakthrough engineering bring deep-space exploration within reach—secure and extraordinary.
                        </motion.p>

                        {/* Actions */}
                        <motion.div 
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ duration: 0.8, delay: 0.8 }}
                            className="flex items-center gap-8 mb-20"
                        >
                            <button className="glass-pill px-8 py-3 rounded-full flex items-center gap-3 font-medium transition-all hover:bg-white/10">
                                Start Your Voyage
                                <IconArrowUpRight />
                            </button>
                            <button className="flex items-center gap-2 text-sm font-medium hover:text-white/80 transition-colors">
                                <IconPlay />
                                View Liftoff
                            </button>
                        </motion.div>

                        {/* Stats Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl w-full mb-16">
                            {[
                                { icon: <IconClock />, value: "34.5 Min", label: "Average Videos Watch Time" },
                                { icon: <IconGlobe />, value: "2.8B+", label: "Users Across the Globe" }
                            ].map((stat, idx) => (
                                <motion.div 
                                    key={idx}
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    transition={{ duration: 0.8, delay: 1 + (idx * 0.1) }}
                                    className="glass-card p-8 rounded-3xl flex flex-col items-start text-left gap-10"
                                >
                                    <div className="text-white/80">{stat.icon}</div>
                                    <div className="flex flex-col gap-1">
                                        <div className="font-serif italic text-4xl">{stat.value}</div>
                                        <div className="text-[10px] text-white/40 uppercase tracking-widest">{stat.label}</div>
                                    </div>
                                </motion.div>
                            ))}
                        </div>

                        {/* Footer Partners */}
                        <motion.div 
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ duration: 0.8, delay: 1.4 }}
                            className="flex flex-col items-center gap-6"
                        >
                            <div className="glass-pill px-6 py-1 text-[10px] uppercase tracking-widest font-medium rounded-full">
                                Collaborating with top aerospace pioneers globally
                            </div>
                            <div className="flex flex-wrap justify-center gap-x-12 gap-y-4 font-serif italic text-2xl text-white/80">
                                {["Aeon", "Vela", "Apex", "Orbit", "Zeno"].map(brand => (
                                    <span key={brand} className="hover:text-white transition-colors cursor-default">
                                        {brand}
                                    </span>
                                ))}
                            </div>
                        </motion.div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
