<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <linearGradient id="ambient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#3c508c" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#000000" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="900" fill="#000"/>

  <!-- Stars -->
  <g opacity="0.6">
    <circle cx="120" cy="80" r="0.8" fill="#fff"/><circle cx="300" cy="45" r="0.5" fill="#fff"/>
    <circle cx="480" cy="120" r="0.7" fill="#fff"/><circle cx="650" cy="60" r="0.4" fill="#fff"/>
    <circle cx="820" cy="95" r="0.6" fill="#fff"/><circle cx="990" cy="40" r="0.8" fill="#fff"/>
    <circle cx="1150" cy="110" r="0.5" fill="#fff"/><circle cx="1320" cy="70" r="0.7" fill="#fff"/>
    <circle cx="200" cy="200" r="0.4" fill="#fff"/><circle cx="400" cy="180" r="0.6" fill="#fff"/>
    <circle cx="700" cy="220" r="0.5" fill="#fff"/><circle cx="1000" cy="190" r="0.7" fill="#fff"/>
    <circle cx="150" cy="350" r="0.3" fill="#fff"/><circle cx="1300" cy="300" r="0.4" fill="#fff"/>
    <circle cx="550" cy="150" r="0.5" fill="#fff"/><circle cx="900" cy="160" r="0.3" fill="#fff"/>
    <circle cx="1100" cy="250" r="0.6" fill="#fff"/><circle cx="350" cy="300" r="0.4" fill="#fff"/>
    <circle cx="750" cy="280" r="0.5" fill="#fff"/><circle cx="50" cy="500" r="0.3" fill="#fff"/>
    <circle cx="1400" cy="150" r="0.4" fill="#fff"/><circle cx="250" cy="450" r="0.5" fill="#fff"/>
    <circle cx="1050" cy="380" r="0.3" fill="#fff"/><circle cx="600" cy="400" r="0.4" fill="#fff"/>
  </g>

  <!-- Ambient glow -->
  <ellipse cx="720" cy="200" rx="500" ry="300" fill="url(#ambient)" opacity="0.8"/>
  <ellipse cx="600" cy="150" rx="250" ry="120" fill="#283c78" opacity="0.15"/>
  <ellipse cx="800" cy="100" rx="180" ry="100" fill="#502864" opacity="0.1"/>

  <!-- ===== NAVBAR ===== -->
  <!-- Logo circle -->
  <circle cx="88" cy="52" r="24" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="88" y="60" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="22" fill="#fff">a</text>

  <!-- Nav pill -->
  <rect x="460" y="24" width="520" height="48" rx="24" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="496" y="54" font-family="sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.9)">Home</text>
  <text x="560" y="54" font-family="sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.9)">Voyages</text>
  <text x="645" y="54" font-family="sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.9)">Worlds</text>
  <text x="720" y="54" font-family="sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.9)">Innovation</text>
  <text x="818" y="54" font-family="sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.9)">Plan Launch</text>
  <!-- CTA button -->
  <rect x="900" y="32" width="72" height="32" rx="16" fill="#fff"/>
  <text x="910" y="53" font-family="sans-serif" font-size="11" font-weight="600" fill="#000">Claim </text>
  <g transform="translate(956, 42)" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 9L9 1"/><path d="M1 1h8v8"/>
  </g>

  <!-- ===== HERO ===== -->

  <!-- "New" badge -->
  <rect x="580" y="320" width="280" height="36" rx="18" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <rect x="586" y="326" width="48" height="24" rx="12" fill="#fff"/>
  <text x="597" y="343" font-family="sans-serif" font-size="11" font-weight="600" fill="#000">New</text>
  <text x="646" y="343" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">Maiden Crewed Voyage to Mars Arrives 2026</text>

  <!-- Headline -->
  <text x="720" y="420" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="78" fill="#fff" letter-spacing="-3">Venture Past Our Sky</text>
  <text x="720" y="500" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="78" fill="#fff" letter-spacing="-3">Across the Universe</text>

  <!-- Subtitle -->
  <text x="720" y="548" text-anchor="middle" font-family="sans-serif" font-weight="300" font-size="14" fill="rgba(255,255,255,0.8)">Discover the universe in ways once unimaginable. Our pioneering vessels and breakthrough</text>
  <text x="720" y="568" text-anchor="middle" font-family="sans-serif" font-weight="300" font-size="14" fill="rgba(255,255,255,0.8)">engineering bring deep-space exploration within reach -- secure and extraordinary.</text>

  <!-- Primary CTA -->
  <rect x="570" y="600" width="185" height="42" rx="21" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <rect x="571" y="601" width="183" height="40" rx="20" fill="rgba(255,255,255,0.04)"/>
  <text x="590" y="627" font-family="sans-serif" font-size="13" font-weight="500" fill="#fff">Start Your Voyage</text>
  <g transform="translate(725, 614)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 11L11 1"/><path d="M1 1h10v10"/>
  </g>

  <!-- Secondary CTA -->
  <polygon points="775,610 775,626 788,618" fill="#fff" opacity="0.9"/>
  <text x="795" y="623" font-family="sans-serif" font-size="13" fill="#fff">View Liftoff</text>

  <!-- ===== STAT CARD 1 ===== -->
  <rect x="540" y="665" width="220" height="105" rx="20" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Clock icon -->
  <g transform="translate(560, 683)" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
  </g>
  <text x="560" y="745" font-family="Georgia,serif" font-style="italic" font-size="34" fill="#fff" letter-spacing="-1">34.5 Min</text>
  <text x="560" y="761" font-family="sans-serif" font-size="10" font-weight="300" fill="rgba(255,255,255,0.6)">Average Videos Watch Time</text>

  <!-- ===== STAT CARD 2 ===== -->
  <rect x="780" y="665" width="220" height="105" rx="20" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Globe icon -->
  <g transform="translate(800, 683)" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c3 3.6 3 13.8 0 18"/><path d="M12 3c-3 3.6-3 13.8 0 18"/>
  </g>
  <text x="800" y="745" font-family="Georgia,serif" font-style="italic" font-size="34" fill="#fff" letter-spacing="-1">2.8B+</text>
  <text x="800" y="761" font-family="sans-serif" font-size="10" font-weight="300" fill="rgba(255,255,255,0.6)">Users Across the Globe</text>

  <!-- ===== PARTNER BAR ===== -->
  <rect x="540" y="800" width="360" height="28" rx="14" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="720" y="819" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Collaborating with top aerospace pioneers globally</text>

  <!-- Partner logos -->
  <text x="380" y="860" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="28" fill="#fff" opacity="0.7" letter-spacing="-1">Aeon</text>
  <text x="560" y="860" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="28" fill="#fff" opacity="0.7" letter-spacing="-1">Vela</text>
  <text x="720" y="860" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="28" fill="#fff" opacity="0.7" letter-spacing="-1">Apex</text>
  <text x="880" y="860" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="28" fill="#fff" opacity="0.7" letter-spacing="-1">Orbit</text>
  <text x="1040" y="860" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="28" fill="#fff" opacity="0.7" letter-spacing="-1">Zeno</text>
</svg>
